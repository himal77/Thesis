version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: iot
      POSTGRES_PASSWORD: iot
      POSTGRES_DB: iot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"           # allows POST /-/reload
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"                        # http://localhost:9090
    extra_hosts:
      - "host.docker.internal:host-gateway"  # lets Prometheus reach localhost services on ALL OSes
    networks:
      - observability-net

  grafana:
    image: grafana/grafana:10.4.2
    container_name: grafana
    restart: unless-stopped
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"                        # http://localhost:3000
    depends_on:
      - prometheus
    networks:
      - observability-net

  config-server:
    image: springcloud/configserver:latest
    container_name: config-server
    ports:
      - "8888:8888"
    environment:
      SPRING_PROFILES_ACTIVE: git
      SPRING_CLOUD_CONFIG_SERVER_GIT_URI: https://github.com/himal77/iot-config-repo
      SPRING_CLOUD_CONFIG_SERVER_GIT_DEFAULT_LABEL: main
      SPRING_CLOUD_CONFIG_SERVER_GIT_CLONE_ON_START: "true"
      SPRING_CLOUD_CONFIG_SERVER_GIT_FORCE_PULL: "true"
      SPRING_CLOUD_CONFIG_SERVER_GIT_SEARCH_PATHS: '{application}'
    restart: unless-stopped

  processor-service:
    image: himal77/processor-service:latest
    container_name: processor-service
    ports:
      - "${PROCESSOR_SERVICE_PORT}:8080"
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888
      SPRING_PROFILES_ACTIVE: test
    env_file:
      - .env
    depends_on:
      - config-server
      - postgres

  query-service:
    image: himal77/query-service:latest
    container_name: query-service
    ports:
      - "${QUERY_SERVICE_PORT}:8080"
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888
      SPRING_PROFILES_ACTIVE: test
    env_file:
      - .env
    depends_on:
      - config-server
      - postgres
      - processor-service


networks:
  observability-net:
    name: observability-net              # fixed name so every service can reference it
    driver: bridge

volumes:
  postgres_data:
  prometheus-data:
  grafana-data: