name: Build & Push Query Service

on:
  push:
    paths:
      - "query-service/**"
      - "commons-core/**"
      - "pom.xml"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build Maven Project
        run: mvn clean package -DskipTests

      - name: Login to Docker Hub
        uses: docker/login-action@v3          # ← replaces manual docker login
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Image
        uses: docker/build-push-action@v5     # ← replaces manual build + push
        with:
          context: .
          file: query-service/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/query-service:latest