server.port=8080
spring.application.name=device-simulator

simulator.current-traffic-profile=GRADUAL_RAMP
simulator.devices-per-network=100

# Target ingestor service (override via env var in K8s)
ingestor.url=http://localhost:8081

# Actuator / Prometheus
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.atlas.metrics.export.enabled=false