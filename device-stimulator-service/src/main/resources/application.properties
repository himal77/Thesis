server.port=8080
spring.application.name=device-simulator

# Scenario: IDLE | RUSH_HOUR | STORM_EVENT | SHIFT_CHANGE | CASCADE
simulator.scenario=IDLE
simulator.devices-per-network=100

# Target ingestor service (override via env var in K8s)
ingestor.url=http://localhost:8081

# Actuator / Prometheus
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true