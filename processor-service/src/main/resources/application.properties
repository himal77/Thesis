server.port=8082
spring.application.name=processor-service

# Alert-engine URL (override via env in K8s)
alert-engine.url=http://localhost:8083

# Anomaly detection tuning
processor.anomaly.threshold=2.5
processor.window.size=100

# PostgreSQL (override via env in K8s)
spring.datasource.url=jdbc:postgresql://localhost:5432/iot
spring.datasource.username=iot
spring.datasource.password=iot
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Actuator / Prometheus
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.atlas.metrics.export.enabled=false