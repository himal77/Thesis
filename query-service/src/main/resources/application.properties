server.port=8084
spring.application.name=query-api

# Query limits ? prevents Grafana from killing PostgreSQL
query.max-results=1000
query.default-lookback-minutes=60

# PostgreSQL ? read-only user recommended for production
# but same credentials fine for thesis
spring.datasource.url=jdbc:postgresql://localhost:5432/iot
spring.datasource.username=iot
spring.datasource.password=iot

# Read-only ? never let query-api modify schema
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Connection pool ? Grafana polls aggressively, need enough connections
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5

# Thread pool ? HPA watches CPU here
server.tomcat.threads.max=80
server.tomcat.threads.min-spare=10

management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.prometheus.metrics.export.enabled=true
management.atlas.metrics.export.enabled=false
