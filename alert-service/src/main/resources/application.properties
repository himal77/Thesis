server.port=8083
spring.application.name=alert-engine

# Alert rule tuning
alert.consecutive-threshold=3
alert.history.size=200
alert.cooldown-seconds=60

# PostgreSQL (override via env in K8s)
spring.datasource.url=jdbc:postgresql://localhost:5432/iot
spring.datasource.username=iot
spring.datasource.password=iot
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Actuator / Prometheus
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.metrics.export.atlas.enabled=false