## How VPA Sees This Service
```
t=0   ? 100 devices  ? ~160KB state  ? VPA recommends 256Mi
t=10m ? 300 devices  ? ~480KB state  ? VPA recommends 320Mi ? restart
t=20m ? 500 devices  ? ~800KB state  ? VPA recommends 420Mi ? restart
t=30m ? 1000 devices ? ~1.6MB state  ? VPA recommends 512Mi ? restart