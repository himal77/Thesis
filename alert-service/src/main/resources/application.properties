server.port=8083
spring.application.name=alert-engine

# Alert rule tuning
alert.consecutive-threshold=3
alert.history.size=200
alert.cooldown-seconds=60

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/edgestorm
spring.datasource.username=edgestorm
spring.datasource.password=edgestorm
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Intentionally generous thread pool ? this service is memory bound
# not thread bound. Don't limit threads here.
server.tomcat.threads.max=100

management.endpoints.web.exposure.include=health,prometheus,info
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true
```

