apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: iot
  labels:
    app: postgres
spec:
  serviceName: postgres          # Must match headless service name below
  replicas: 1                    # Not scaled per your spec — single primary
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: iot
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: iot-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: iot-secrets
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata   # Subdirectory avoids mount permission issues
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "iot"]
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "iot"]
            initialDelaySeconds: 30
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi         # Adjust based on expected data volume

---
# Headless service for StatefulSet — gives stable DNS: postgres.iot.svc.cluster.local
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: iot
spec:
  clusterIP: None              # Headless — required for StatefulSet DNS
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
