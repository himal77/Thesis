apiVersion: v1
kind: ConfigMap
metadata:
  name: iot-shared-config
  namespace: iot
data:
  SPRING_CONFIG_IMPORT: "configserver:http://config-server:8888"
  CONFIG_SERVER_URL: "http://config-server:8888"
  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "iot"

---
# Store sensitive values in a Secret (fill in base64-encoded values)
# echo -n "iot" | base64  →  aW90
apiVersion: v1
kind: Secret
metadata:
  name: iot-secrets
  namespace: iot
type: Opaque
data:
  POSTGRES_USER: aW90        # "iot"
  POSTGRES_PASSWORD: aW90   # "iot"
