# device-simulator — Load generator, fixed at 1 replica, no HPA/VPA
apiVersion: apps/v1
kind: Deployment
metadata:
  name: device-simulator
  namespace: iot
  labels:
    app: device-simulator
spec:
  replicas: 1                    # Fixed — this is a load generator, not a scalable service
  selector:
    matchLabels:
      app: device-simulator
  template:
    metadata:
      labels:
        app: device-simulator
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8080"
    spec:
      containers:
        - name: device-simulator
          image: himal77/device-simulator:latest
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_CONFIG_IMPORT
              valueFrom:
                configMapKeyRef:
                  name: iot-shared-config
                  key: SPRING_CONFIG_IMPORT
            - name: SPRING_PROFILES_ACTIVE
              value: prod
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20

---
apiVersion: v1
kind: Service
metadata:
  name: device-simulator
  namespace: iot
spec:
  selector:
    app: device-simulator
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080            # Access via NodePort for testing
  type: NodePort
