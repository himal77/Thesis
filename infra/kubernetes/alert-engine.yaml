# alert-engine — Memory bound, VPA manages memory sizing
# Fixed replicas — VPA will right-size memory requests automatically
# Do NOT add HPA on CPU here — HPA + VPA on same metric causes conflicts
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alert-engine
  namespace: iot
  labels:
    app: alert-engine
spec:
  replicas: 2                    # Fixed replica count — VPA handles sizing, not scaling
  selector:
    matchLabels:
      app: alert-engine
  template:
    metadata:
      labels:
        app: alert-engine
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8080"
    spec:
      containers:
        - name: alert-engine
          image: himal77/alert-service:latest
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_CONFIG_IMPORT
              valueFrom:
                configMapKeyRef:
                  name: iot-shared-config
                  key: SPRING_CONFIG_IMPORT
            - name: SPRING_PROFILES_ACTIVE
              value: prod
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"    # Higher memory request — VPA will tune this over time
            limits:
              cpu: "500m"
              memory: "2Gi"      # Allow VPA room to grow memory up to 2Gi
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20

---
apiVersion: v1
kind: Service
metadata:
  name: alert-engine
  namespace: iot
spec:
  selector:
    app: alert-engine
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30083
  type: NodePort
