apiVersion: apps/v1
kind: Deployment
metadata:
  name: processor-service
  namespace: iot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: processor-service
  template:
    metadata:
      labels:
        app: processor-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8082"
    spec:
      containers:
        - name: processor-service
          image: himal77/processor-service:latest
          ports:
            - containerPort: 8082
          env:
            - name: ALERT_ENGINE_URL
              value: "http://alert-service:8083"
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: url
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: password
            - name: ANOMALY_THRESHOLD
              value: "0.8"
            - name: WINDOW_SIZE
              value: "10"
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: processor-service
  namespace: iot
spec:
  selector:
    app: processor-service
  ports:
    - port: 8082
      targetPort: 8082
